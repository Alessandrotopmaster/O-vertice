<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>VÉRTICE | Plataforma Completa</title>
    <meta name="description" content="VÉRTICE - Crie e-books, sites, lojas de afiliados, tráfego pago - Sandro Rhilmanelly">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%236C3CE1'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40' font-weight='bold'%3EV%3C/text%3E%3C/svg%3E">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --primary:#6C3CE1; --primary-light:#8B5CF6; --secondary:#00D4FF;
            --accent:#FF6B35; --success:#00E676; --danger:#FF1744; --warning:#FFD600;
            --dark:#0a0a0a; --card:#151515; --card-hover:#1f1f1f;
            --text:#fff; --text-secondary:#a0a0a0; --border:#2a2a2a;
            --shadow:0 10px 40px rgba(0,0,0,0.5); --radius:20px; --radius-sm:12px;
            --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
        }
        ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--dark)} ::-webkit-scrollbar-thumb{background:var(--primary);border-radius:10px}
        body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
        
        .header{position:fixed;top:0;left:0;right:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);z-index:1000;padding:12px 5%;border-bottom:1px solid var(--border);padding-top:calc(12px + var(--safe-top))}
        .navbar{display:flex;justify-content:space-between;align-items:center;max-width:1400px;margin:0 auto}
        .logo{font-size:28px;font-weight:800;display:flex;align-items:center;gap:5px}
        .logo .v{color:var(--primary);position:relative}
        .logo .v::after{content:'▲';font-size:12px;color:var(--secondary);position:absolute;top:-8px;right:-18px}
        .logo .plus{color:var(--secondary)}
        .logo .badge{font-size:9px;background:var(--success);color:var(--dark);padding:2px 8px;border-radius:20px;font-weight:700;margin-left:8px}
        .logo .sandro{font-size:10px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:2px 10px;border-radius:20px;font-weight:600;margin-left:8px}
        .nav-menu{display:flex;list-style:none;gap:15px;align-items:center}
        .nav-menu a{color:var(--text-secondary);text-decoration:none;font-weight:500;transition:var(--transition);font-size:13px;padding:5px 0;border-bottom:2px solid transparent}
        .nav-menu a:hover,.nav-menu a.active{color:var(--text)}
        .nav-menu a.active{border-bottom-color:var(--secondary)}
        .btn-primary{padding:10px 25px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:30px;color:#fff;font-weight:600;cursor:pointer;transition:var(--transition);font-size:14px}
        .btn-primary:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(108,60,225,0.3)}
        .btn-secondary{padding:10px 25px;background:transparent;border:2px solid var(--primary);border-radius:30px;color:var(--text);font-weight:600;cursor:pointer;transition:var(--transition);font-size:14px}
        .btn-secondary:hover{background:var(--primary)}
        .hamburger{display:none;flex-direction:column;cursor:pointer;gap:5px;padding:5px}
        .hamburger span{width:25px;height:2px;background:#fff;transition:var(--transition);border-radius:2px}
        .hamburger.active span:nth-child(1){transform:rotate(45deg)translate(5px,5px)}
        .hamburger.active span:nth-child(2){opacity:0}
        .hamburger.active span:nth-child(3){transform:rotate(-45deg)translate(5px,-5px)}
        
        .main{padding:80px 5% 40px;max-width:1400px;margin:0 auto;min-height:100vh}
        
        .hero{text-align:center;padding:40px 0 30px;position:relative}
        .hero::after{content:'';position:absolute;top:-50%;left:50%;transform:translateX(-50%);width:80%;height:80%;background:radial-gradient(circle,rgba(108,60,225,0.15),transparent 70%);z-index:-1}
        .hero h1{font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.2}
        .hero .sub{font-size:18px;color:var(--text-secondary);max-width:700px;margin:15px auto;line-height:1.6}
        .hero .tag{display:inline-block;background:linear-gradient(135deg,var(--primary),var(--secondary));padding:5px 20px;border-radius:30px;font-size:14px;font-weight:600;margin-bottom:20px;color:#fff}
        .hero-btns{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
        
        .golden{background:linear-gradient(135deg,rgba(108,60,225,0.15),rgba(0,212,255,0.08));border:1px solid var(--primary);border-radius:var(--radius);padding:20px 30px;margin:30px 0;text-align:center;backdrop-filter:blur(10px)}
        .golden strong{color:var(--accent)}
        
        .status{background:var(--card);border-radius:var(--radius-sm);padding:12px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;border:1px solid var(--border)}
        .status .ind{display:flex;align-items:center;gap:8px;font-size:14px}
        .dot{width:10px;height:10px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
        .dot.on{background:var(--success)}
        .dot.off{background:var(--danger)}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
        
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;margin:40px 0}
        .card{background:var(--card);border-radius:var(--radius);padding:30px;border:1px solid var(--border);transition:var(--transition);cursor:pointer;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));transform:scaleX(0);transition:var(--transition)}
        .card:hover::before{transform:scaleX(1)}
        .card:hover{border-color:var(--primary);transform:translateY(-5px);box-shadow:var(--shadow);background:var(--card-hover)}
        .card .icn{font-size:40px;margin-bottom:15px;display:block}
        .card h3{font-size:20px;margin-bottom:10px}
        .card p{color:var(--text-secondary);font-size:14px;line-height:1.6}
        .card .badge{display:inline-block;background:rgba(108,60,225,0.3);color:var(--secondary);padding:3px 12px;border-radius:20px;font-size:12px;margin-top:10px}
        .card .new{background:var(--accent);color:#fff;padding:2px 10px;border-radius:20px;font-size:10px;margin-left:8px;animation:pulse 2s infinite}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);z-index:2000;overflow-y:auto;padding:80px 5% 40px;animation:fadeIn .3s ease}
        .modal.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        .modal-content{max-width:1100px;margin:0 auto;background:var(--card);border-radius:var(--radius);padding:40px;border:1px solid var(--border);position:relative}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;border-bottom:1px solid var(--border);padding-bottom:20px;flex-wrap:wrap;gap:10px}
        .modal-header h2{font-size:28px;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;background-clip:text;color:transparent}
        .modal-close{font-size:30px;cursor:pointer;color:var(--text-secondary);transition:var(--transition);line-height:1}
        .modal-close:hover{color:var(--text);transform:rotate(90deg)}
        
        .wf{display:flex;gap:15px;margin:20px 0 30px;flex-wrap:wrap}
        .wf-btn{padding:14px 25px;background:var(--dark);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-weight:600;cursor:pointer;transition:var(--transition);flex:1;min-width:150px;text-align:center;display:flex;align-items:center;justify-content:center;gap:10px}
        .wf-btn:hover{border-color:var(--primary);background:var(--card-hover)}
        .wf-btn.active{border-color:var(--secondary);background:rgba(0,212,255,0.1)}
        
        .fg{margin-bottom:20px}
        .fg label{display:block;margin-bottom:8px;font-weight:500;font-size:14px;color:var(--text-secondary)}
        .fg input,.fg textarea,.fg select{width:100%;padding:14px 18px;background:var(--dark);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;transition:var(--transition);font-family:'Inter',sans-serif}
        .fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,60,225,0.2)}
        .fg textarea{min-height:80px;resize:vertical}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        
        .btn-action{padding:14px 35px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:30px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:10px}
        .btn-action:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(108,60,225,0.3)}
        .btn-action-outline{background:transparent;border:2px solid var(--primary);color:var(--text)}
        .btn-action-outline:hover{background:var(--primary)}
        .btn-action-success{background:linear-gradient(135deg,var(--success),#00C853)}
        .btn-action-danger{background:linear-gradient(135deg,var(--danger),#D50000)}
        
        .result{margin-top:30px;padding:25px;background:var(--dark);border-radius:var(--radius);border:1px solid var(--border);display:none}
        .result.active{display:block;animation:fadeIn .3s ease}
        .result h4{color:var(--secondary);margin-bottom:15px;display:flex;align-items:center;gap:10px}
        .result .preview{color:var(--text-secondary);line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;font-size:14px;background:rgba(0,0,0,0.3);padding:15px;border-radius:var(--radius-sm)}
        
        .plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:30px 0}
        .plan{background:var(--dark);border-radius:var(--radius);padding:30px;text-align:center;border:1px solid var(--border);transition:var(--transition)}
        .plan:hover{transform:translateY(-5px);border-color:var(--primary)}
        .plan.featured{border-color:var(--secondary);background:linear-gradient(135deg,var(--dark),rgba(0,212,255,0.05))}
        .plan .name{font-size:20px;font-weight:700}
        .plan .price{font-size:32px;font-weight:800;color:var(--secondary);margin:15px 0}
        .plan ul{list-style:none;text-align:left;margin:15px 0}
        .plan ul li{padding:6px 0;font-size:13px;color:var(--text-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
        .plan ul li:last-child{border-bottom:none}
        .plan ul li .check{color:var(--success)}
        .plan ul li .x{color:var(--danger)}
        .plan .btn-plan{width:100%;padding:12px;border-radius:30px;font-weight:700;border:none;cursor:pointer;transition:var(--transition);margin-top:10px}
        .plan .btn-plan:hover{transform:scale(1.03)}
        .plan .btn-plan.free{background:var(--border);color:var(--text)}
        .plan .btn-plan.basic{background:var(--secondary);color:var(--dark)}
        .plan .btn-plan.advanced{background:var(--primary);color:#fff}
        .plan .btn-plan.premium{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
        .plan .btn-plan.current{background:var(--success);color:var(--dark);cursor:default}
        
        .prod-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:20px 0}
        .prod{background:var(--dark);border-radius:var(--radius-sm);padding:18px;border:1px solid var(--border);transition:var(--transition)}
        .prod:hover{border-color:var(--primary);transform:translateY(-3px)}
        .prod .img{width:100%;height:130px;background:var(--card);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:12px;border:1px solid var(--border)}
        .prod .name{font-weight:600;font-size:15px}
        .prod .price{color:var(--secondary);font-size:18px;font-weight:700;margin:6px 0}
        .prod .link{color:var(--text-secondary);font-size:11px;word-break:break-all}
        .prod .btn-remove{background:var(--danger);border:none;padding:5px 15px;border-radius:15px;color:#fff;cursor:pointer;font-size:12px;margin-top:10px}
        .prod .btn-buy{background:var(--success);border:none;padding:8px 20px;border-radius:20px;color:var(--dark);font-weight:700;cursor:pointer;font-size:14px;margin-top:10px;transition:var(--transition)}
        .prod .btn-buy:hover{transform:scale(1.05)}
        
        .drop{border:3px dashed var(--border);border-radius:var(--radius);padding:40px;text-align:center;transition:var(--transition);cursor:pointer;margin:20px 0}
        .drop:hover,.drop.dragover{border-color:var(--secondary);background:rgba(0,212,255,0.05)}
        .drop .icn{font-size:48px;color:var(--text-secondary);margin-bottom:15px}
        .drop .txt{color:var(--text-secondary)}
        .drop .txt strong{color:var(--secondary)}
        
        .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:20px;margin:30px 0}
        .dash{background:var(--card);border-radius:var(--radius);padding:25px;text-align:center;border:1px solid var(--border);transition:var(--transition)}
        .dash:hover{border-color:var(--primary)}
        .dash .num{font-size:32px;font-weight:800;color:var(--secondary)}
        .dash .lbl{color:var(--text-secondary);font-size:14px;margin-top:5px}
        
        .limit{background:rgba(255,214,0,0.15);border:1px solid var(--warning);border-radius:var(--radius-sm);padding:15px 20px;margin:20px 0;color:var(--warning);display:none}
        .limit.active{display:block;animation:slideDown .5s ease}
        .limit .btn-up{background:var(--warning);border:none;padding:8px 20px;border-radius:20px;font-weight:700;color:var(--dark);cursor:pointer;margin-top:10px}
        @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
        
        .app-banner{display:none;background:linear-gradient(135deg,var(--primary),var(--secondary));padding:12px 20px;border-radius:var(--radius-sm);align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;animation:slideDown .5s ease;position:fixed;bottom:20px;left:5%;right:5%;z-index:999;box-shadow:var(--shadow)}
        .app-banner.show{display:flex}
        .app-banner .btn-install{background:var(--dark);border:none;padding:10px 25px;border-radius:30px;font-weight:700;color:#fff;cursor:pointer;transition:var(--transition)}
        .app-banner .btn-install:hover{transform:scale(1.05)}
        .app-banner .btn-close{background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.7}
        
        .footer{text-align:center;padding:40px 5% 20px;border-top:1px solid var(--border);margin-top:40px;color:var(--text-secondary);font-size:14px}
        .footer .badges{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-bottom:20px}
        .footer .badges span{background:var(--card);padding:5px 15px;border-radius:20px;font-size:12px;border:1px solid var(--border)}
        .footer .credits{color:var(--primary-light);font-weight:600;margin-top:10px}
        
        @media(max-width:768px){
            .nav-menu{display:none;position:fixed;top:60px;left:0;width:100%;background:var(--dark);flex-direction:column;padding:30px;gap:15px;border-bottom:1px solid var(--border)}
            .nav-menu.active{display:flex}
            .hamburger{display:flex}
            .hero h1{font-size:32px}
            .row{grid-template-columns:1fr}
            .grid{grid-template-columns:1fr}
            .modal{padding:60px 3% 20px}
            .modal-content{padding:20px}
            .prod-grid{grid-template-columns:1fr}
            .app-banner{left:10px;right:10px;bottom:10px;padding:12px 15px}
        }
        @media(max-width:480px){
            .hero h1{font-size:28px}
            .logo{font-size:22px}
            .plans{grid-template-columns:1fr}
            .status{flex-direction:column;text-align:center}
        }
    </style>
</head>
<body>

        <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:48px;height:48px;background:var(--dark);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--primary);">V</div>
            <div style="font-size:14px;font-weight:500;">VÉRTICE <small style="display:block;font-weight:400;opacity:0.8;font-size:12px;">Instale o app para melhor experiência</small></div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn-install" id="installAppBtn"><i class="fas fa-download"></i> Instalar</button>
            <button class="btn-close" onclick="closeInstallBanner()">✕</button>
        </div>
    </div>

        <nav class="navbar">

                <span class="v">VÉRTICE</span><span class="plus">PLUS</span>
                <span class="badge">APP</span>

                <li><a href="#" onclick="openModule('sites')"><i class="fas fa-globe"></i> Sites</a></li>

                <li><a href="#" onclick="openModule('planos')"><i class="fas fa-crown"></i> Planos</a></li>
                <li><button class="btn-primary" onclick="showDashboard()"><i cl
